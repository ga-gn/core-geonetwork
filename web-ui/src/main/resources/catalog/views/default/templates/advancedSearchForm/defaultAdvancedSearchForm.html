<div class="gn-search-filter advancedSearchForm">
  <label data-translate="">options</label>
  <div class="search-options">
    <gn-search-options></gn-search-options>
  </div>
  <label
    data-ng-if="searchObj.params.resourceTemporalDateRange"
    class="gn-margin-top"
    data-translate=""
    >advanced</label
  >
  <div
    data-ng-if="searchObj.params.resourceTemporalDateRange"
    data-gn-date-range-filter="resourceTemporalDateRange"
    data-field="searchObj.params.resourceTemporalDateRange"
    data-field-name="'resourceTemporalDateRange'"
    class="gn-search-filter-datepicker"
  ></div>

  <div class="gn-margin-top">
    <label for="customTextField">eCat ID</label>
    <input
      class="form-control filter-text"
      type="search"
      placeholder="{{'filter' | translate}}"
      autofocus=""
      data-ng-model="searchObj.params.eCatIdSearch"
    />
  </div>

  <div class="gn-margin-top">
    <label for="customTextField">Author</label>
    <input
      class="form-control filter-text"
      type="search"
      placeholder="{{'filter' | translate}}"
      autofocus=""
      data-ng-model="searchObj.params.authorSearch"
    />
  </div>

  <div class="gn-margin-top">
    <label for="customTextField">Title</label>
    <input
      class="form-control filter-text"
      type="search"
      placeholder="{{'filter' | translate}}"
      autofocus=""
      data-ng-model="searchObj.params.titleSearch"
    />
  </div>
</div>
